<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Channels</title>
    <base href="/" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="ChannelApp.Presentation.styles.css" rel="stylesheet" />
    <meta name="theme-color" content="#2C2C3A" />
</head>
<body>
    <div id="app">Loading...</div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        navigator.serviceWorker.register('service-worker.js');
        window.setTheme = function(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            var color = theme === 'dark' ? '#121212' : '#2C2C3A';
            document.querySelector('meta[name="theme-color"]').setAttribute('content', color);
        };
        window.setTextScale = function(value) {
            document.documentElement.style.setProperty('--text-scale', value);
        };
    </script>
</body>
</html>
